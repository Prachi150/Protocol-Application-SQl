<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="lsgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#lsgGradient)" stroke="#ffffff" stroke-width="1"/>
  
  <!-- LSG Text -->
  <text x="16" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" 
        text-anchor="middle" fill="#ffffff">LSG</text>
  
  <!-- Tech dots pattern -->
  <circle cx="8" cy="8" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="24" cy="8" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="8" cy="24" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="24" cy="24" r="1" fill="#ffffff" opacity="0.6"/>
</svg> 